id: Welcome
name: Welcome
systemPrompt: prompts/systemprompt.md
prompt: prompts/welcome.md
responseFormat: results/ToolVersion.json
responseProperty: tool
toolWhitelist:
  - info_get_version
---
id: LocateREADME
name: Locate project README
prompt: prompts/locate_readme.md
systemPrompt: prompts/systemprompt.md
responseFormat: results/Location.json
responseProperty: readme
toolWhitelist:
  - filesystem_get_all_files_in_dir
tags:
  - readme_location
---
id: ProjectSummary
name: Project summary
prompt: prompts/project_summary.md
systemPrompt: prompts/systemprompt.md
responseFormat: results/ProjectSummary.json
responseProperty: project
tags:
  - project_summary
toolWhitelist:
  - fileio_read_file
---
id: BuildSystems
name: Detect used Build Systems
prompt: prompts/build_systems.md
systemPrompt: prompts/systemprompt.md
responseFormat: results/BuildSystems.json
responseProperty: build
tags:
  - buildsystems
toolWhitelist:
  - filesystem_get_matching_files_in_dir_recursively
---
id: LocateModules
name: Locate code modules
prompt: prompts/locate_modules.md
systemPrompt: prompts/systemprompt.md
responseFormat: results/Modules.json
responseProperty: modules
active: true
dependsOn:
  - buildsystems
  - project_summary
tags:
  - modules
toolWhitelist:
  - filesystem_get_matching_files_in_dir_recursively
